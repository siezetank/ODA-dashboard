  .frame{position:fixed;inset:11px;border:1px solid var(--line);pointer-events:none;z-index:5;}
  .frame::after{content:"";position:absolute;inset:4px;border:1px solid rgba(200,164,92,.12);}
  .stage{position:relative;z-index:2;min-height:100svh;display:flex;flex-direction:column;
    padding:34px 30px calc(26px + env(safe-area-inset-bottom));max-width:680px;margin:0 auto;}
  .top{display:flex;align-items:center;justify-content:space-between;
    font-size:11px;letter-spacing:.34em;color:var(--muted);text-transform:uppercase;}
  .top .a{color:var(--gold);}
  .center{flex:1;display:flex;flex-direction:column;justify-content:center;}
  h1{font-family:var(--serif-ko);font-weight:700;font-size:36px;line-height:1.26;letter-spacing:-.01em;
    text-align:center;text-shadow:0 2px 30px rgba(0,0,0,.55);}
  .rule{width:46px;height:1px;background:var(--gold);margin:20px auto 0;position:relative;}
  .rule::before,.rule::after{content:"";position:absolute;top:50%;width:4px;height:4px;background:var(--red);transform:translateY(-50%) rotate(45deg);}
  .rule::before{left:-10px;} .rule::after{right:-10px;}

  .halls{margin-top:34px;border-top:1px solid var(--line-soft);}
  .banner{position:relative;display:flex;align-items:center;gap:14px;padding:16px 14px;
    border-bottom:1px solid var(--line-soft);overflow:hidden;text-decoration:none;color:inherit;
    cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .35s;}
  .sweep{position:absolute;inset:0;pointer-events:none;transform:translateX(-101%);
    background:linear-gradient(90deg,rgba(200,164,92,.22),rgba(200,164,92,.04) 55%,transparent);
    transition:transform .55s cubic-bezier(.2,.7,.2,1);}
  .edge{position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--gold);
    transform:scaleY(0);transition:transform .4s ease;}
  .b-icon{flex:none;width:56px;display:flex;flex-direction:column;align-items:center;gap:5px;
    color:var(--faint);transition:color .35s;}
  .b-icon svg{width:30px;height:30px;display:block;transition:transform .35s,filter .35s;}
  .b-code{font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--gold);transition:color .35s;}
  .b-body{flex:1;min-width:0;position:relative;}
  .b-title{font-family:var(--serif-ko);font-weight:500;font-size:21px;color:var(--ink);transition:color .35s,transform .35s;}
  .b-detail{font-family:var(--serif-ko);font-size:13.5px;letter-spacing:.04em;color:var(--faint);
    margin-top:4px;opacity:0;transform:translateY(3px);transition:opacity .4s,transform .4s;}
  .b-go{position:relative;font-size:12px;letter-spacing:.12em;color:var(--gold);white-space:nowrap;
    opacity:0;transform:translateX(-6px);transition:opacity .35s,transform .35s;}

  @media (hover:hover){
    .banner:hover{background:rgba(200,164,92,.05);}
    .banner:hover .sweep{transform:translateX(0);}
    .banner:hover .edge{transform:scaleY(1);}
    .banner:hover .b-icon{color:var(--gold);}
    .banner:hover .b-icon svg{transform:scale(1.15);filter:drop-shadow(0 0 7px rgba(200,164,92,.55));}
    .banner:hover .b-code{color:var(--gold-hi);}
    .banner:hover .b-title{color:var(--gold-hi);transform:translateX(5px);}
    .banner:hover .b-detail{opacity:1;transform:none;}
    .banner:hover .b-go{opacity:1;transform:none;}
  }
  @media (hover:none){
    .b-detail{opacity:1;transform:none;}
    a.banner .b-go{opacity:1;transform:none;}
    .banner.now .edge{transform:scaleY(1);}
    .banner.now .b-icon{color:var(--gold-hi);}
    .banner.now .b-title{color:var(--gold-hi);}
  }

  .foot{display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--muted);}
  .foot-ko{display:flex;align-items:center;justify-content:center;gap:9px;font-size:12.5px;letter-spacing:.10em;}
  .foot-en{font-family:var(--serif-la);font-style:italic;font-size:12.5px;letter-spacing:.10em;color:var(--faint);}
  .taegeuk{width:22px;height:22px;flex:none;display:block;object-fit:contain;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5));}

  a:focus-visible{outline:1px solid var(--gold);outline-offset:4px;}
  @media (max-width:430px){ h1{font-size:30px;} .stage{padding:30px 22px;} .b-title{font-size:19px;} }
  @media (max-height:680px){ h1{font-size:26px;} .halls{margin-top:20px;} .banner{padding:12px 14px;} }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
  /* 남색·금색·붉은색 3색 강조 */
  .banner.now .edge{background:var(--red);}
  .banner.now .b-icon{color:var(--red-hi);}
  .banner.now .b-go{color:var(--red-hi);}
</style>
